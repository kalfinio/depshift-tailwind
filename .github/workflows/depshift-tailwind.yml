name: DepShift Tailwind

on:
  pull_request:

jobs:
  depshift-tailwind:
    name: DepShift Tailwind check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build DepShift Tailwind
        run: npm run build

      - name: Run DepShift Tailwind check
        run: node dist/cli.js --check

      - name: Upload DepShift report
        if: ${{ always() && hashFiles('depshift-report.md') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: depshift-report
          path: depshift-report.md
